<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Nigeria PAYE Compliance Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://unpkg.com/tesseract.js@4.1.1/dist/tesseract.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body{
font-family:'Inter',sans-serif;
margin:0;
background:#f8fafc;
}

/* NAVBAR */

.nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:16px 8%;
background:white;
box-shadow:0 2px 10px rgba(0,0,0,.05);
}

.logo{
font-weight:700;
font-size:18px;
}

.back{
text-decoration:none;
color:#2563eb;
font-weight:600;
}

/* DASHBOARD GRID */

.dashboard{
display:grid;
grid-template-columns:260px 1fr;
min-height:100vh;
}

/* SIDEBAR */

.sidebar{
background:white;
border-right:1px solid #e5e7eb;
padding:20px;
}

.menu{
margin-top:20px;
}

.menu div{
padding:10px;
border-radius:8px;
cursor:pointer;
margin-bottom:8px;
}

.menu div:hover{
background:#f1f5f9;
}

.menu .active{
background:#2563eb;
color:white;
}

/* MAIN AREA */

.main{
padding:30px;
}

.card{
background:white;
padding:24px;
border-radius:14px;
box-shadow:0 10px 25px rgba(0,0,0,.05);
margin-bottom:20px;
}

button{
background:#2563eb;
border:none;
color:white;
padding:12px;
border-radius:10px;
cursor:pointer;
margin-top:10px;
}

button.camera{
background:#0f766e;
}

input{
width:100%;
padding:10px;
margin-top:8px;
border-radius:8px;
border:1px solid #e5e7eb;
}

.result{
margin-top:15px;
background:#f1f5f9;
padding:14px;
border-radius:10px;
}

.relief{
background:#eef6ff;
padding:14px;
border-radius:10px;
margin-top:15px;
}

.checkbox{
display:flex;
gap:8px;
margin-top:10px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:15px;
}

th,td{
border:1px solid #e5e7eb;
padding:8px;
}

</style>
</head>

<body>

<!-- NAVBAR -->

<div class="nav">
<div class="logo">🇳🇬 PAYE Compliance Dashboard</div>
<a href="index.html" class="back">← Back to Home</a>
</div>

<div class="dashboard">

<!-- SIDEBAR -->

<div class="sidebar">

<h3>Tools</h3>

<div class="menu">
<div class="active" onclick="openTab('compare',this)">Payslip Scanner</div>
<div onclick="openTab('pit',this)">PIT Calculator</div>
<div onclick="openTab('bulk',this)">Excel Payroll Audit</div>
</div>

</div>

<!-- MAIN CONTENT -->

<div class="main">

<!-- OCR TOOL -->

<div id="compare" class="tab-content active">

<div class="card">

<h3>📷 Payslip Scanner</h3>

<input type="file" id="galleryInput" accept="image/*,.pdf">

<button class="camera" onclick="cameraInput.click()">
Open Camera
</button>

<input type="file" id="cameraInput" accept="image/*" capture="environment" style="display:none">

<div id="previewContainer"></div>

<button onclick="processSelectedFile()">
Process Payslip
</button>

<p id="loading"></p>

</div>

<div class="card relief">

<h3>🏠 Rent Relief Declaration</h3>

<div class="checkbox">
<input type="checkbox" id="rentCheck">
<label>I confirm I pay rent</label>
</div>

<label>Annual Rent</label>
<input type="number" id="rentAmount">

<div class="checkbox">
<input type="checkbox" id="employerHouse">
<label>Employer provides accommodation</label>
</div>

<button onclick="applyRentRelief()">
Apply Rent Relief
</button>

</div>

<div id="result" class="result"></div>

</div>

<!-- PIT CALCULATOR -->

<div id="pit" class="tab-content" style="display:none">

<div class="card">

<h3>PIT Calculator</h3>

<label>Monthly Gross</label>
<input type="number" id="pitGross">

<label>Allowable Expenses</label>
<input type="number" id="pitExpenses">

<button onclick="calculatePIT()">Calculate PIT</button>

<div id="pitResult" class="result"></div>

</div>

</div>

<!-- EXCEL AUDIT -->

<div id="bulk" class="tab-content" style="display:none">

<div class="card">

<h3>Payroll Excel Audit</h3>

<input type="file" id="excelFile" accept=".xlsx">

<button onclick="processExcel()">Process Payroll</button>

<div id="excelPreview"></div>

<button id="downloadBtn" onclick="downloadExcel()" style="display:none">
Download Processed Excel
</button>

</div>

</div>

</div>

</div>

<script src="script.js"></script>

<script>

function openTab(id,el){

document.querySelectorAll(".tab-content").forEach(t=>t.style.display="none")
document.getElementById(id).style.display="block"

document.querySelectorAll(".menu div").forEach(m=>m.classList.remove("active"))
el.classList.add("active")

}

</script>

</body>
</html>
