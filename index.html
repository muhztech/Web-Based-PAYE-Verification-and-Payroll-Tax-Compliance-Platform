<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Nigeria PAYE & PIT Tool</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://unpkg.com/tesseract.js@4.1.1/dist/tesseract.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
/* KEEPING YOUR EXISTING STYLES */
body{
  font-family:'Inter',sans-serif;
  background:linear-gradient(135deg,#eef2f7,#f9fafb);
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
}
.card{
  max-width:720px;
  width:100%;
  background:#fff;
  border-radius:18px;
  padding:26px;
  box-shadow:0 20px 40px rgba(0,0,0,.12);
}
h2{text-align:center;}
.subtitle{text-align:center;color:#64748b;font-size:14px;margin-bottom:20px;}

.tabs{
  display:flex;
  gap:8px;
  margin-bottom:20px;
  flex-wrap:wrap;
}
.tab{
  flex:1;
  padding:10px;
  border-radius:10px;
  text-align:center;
  font-weight:600;
  cursor:pointer;
  background:#e5e7eb;
}
.tab.active{
  background:#2563eb;
  color:#fff;
}

.tab-content{display:none;}
.tab-content.active{display:block;}

label{font-weight:600;font-size:14px;display:block;margin-top:12px;}
input,button{
  width:100%;
  padding:12px;
  margin-top:6px;
  font-size:15px;
  border-radius:10px;
}
input{border:1px solid #cbd5e1;}
button{
  border:none;
  background:#2563eb;
  color:#fff;
  font-weight:600;
  cursor:pointer;
}
button.secondary{background:#0f766e;}
button:hover{opacity:.9}

.result{
  margin-top:18px;
  background:#f1f5f9;
  padding:16px;
  border-radius:12px;
  font-size:14px;
  line-height:1.7;
}
.table-preview{
  margin-top:15px;
  max-height:300px;
  overflow:auto;
  border:1px solid #cbd5e1;
}
table{
  width:100%;
  border-collapse:collapse;
  font-size:13px;
}
th,td{
  padding:6px;
  border:1px solid #e2e8f0;
  text-align:left;
}
.footer{text-align:center;font-size:12px;color:#94a3b8;margin-top:18px;}
</style>
</head>

<body>
<div class="card">
<h2>🇳🇬 PAYE & PIT Calculator</h2>
<p class="subtitle">Nigeria Tax Reform Tools</p>

<div class="tabs">
  <div class="tab active" onclick="openTab('compare', this)">PAYE Comparison</div>
  <div class="tab" onclick="openTab('pit', this)">New PIT</div>
  <div class="tab" onclick="openTab('bulk', this)">Excel Bulk Payroll</div>
</div>

<!-- ================= PAYE TAB ================= -->
<div id="compare" class="tab-content active">
<label>Monthly Gross Salary (₦)</label>
<input type="number" id="manualSalary">

<label>Current Monthly PAYE (₦)</label>
<input type="number" id="manualOldPAYE">

<button onclick="manualCompare()">Compare PAYE</button>
<div class="result" id="result"></div>
</div>

<!-- ================= PIT TAB ================= -->
<div id="pit" class="tab-content">
<label>Monthly Gross Income (₦)</label>
<input type="number" id="pitGross">

<label>Monthly Allowable Expenses (₦)</label>
<input type="number" id="pitExpenses">

<button onclick="calculatePIT()">Calculate PIT</button>
<div class="result" id="pitResult"></div>
</div>

<!-- ================= BULK EXCEL TAB ================= -->
<div id="bulk" class="tab-content">

<label>Upload Payroll Excel (.xlsx)</label>
<input type="file" id="excelFile" accept=".xlsx,.xls">

<button onclick="processExcel()">Process Payroll</button>

<div class="table-preview" id="excelPreview"></div>

<button onclick="downloadExcel()" style="display:none;" id="downloadBtn">
Download Processed Excel
</button>

</div>

<div class="footer">© 2026 Muhztech PAYE Automation</div>
</div>

<script>

/* ===== TAB SWITCH ===== */
function openTab(id, el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
  document.getElementById(id).classList.add('active');
}

/* ===== TAX SETTINGS ===== */
const EXEMPT = 800000;
const BANDS = [
  {limit:2200000, rate:0.15},
  {limit:9000000, rate:0.18},
  {limit:13000000, rate:0.21},
  {limit:25000000, rate:0.23},
  {limit:Infinity, rate:0.25}
];

function annualTax(annual){
  let tax = 0;
  if(annual > EXEMPT){
    let rem = annual - EXEMPT;
    for(let b of BANDS){
      if(rem <= 0) break;
      let amt = Math.min(b.limit, rem);
      tax += amt * b.rate;
      rem -= amt;
    }
  }
  return tax;
}

function computeNewPAYE(monthly){
  return annualTax(monthly * 12) / 12;
}

/* ===== MANUAL PAYE ===== */
function manualCompare(){
  const gross = Number(manualSalary.value);
  const oldPAYE = Number(manualOldPAYE.value);
  const newPAYE = computeNewPAYE(gross);

  result.innerHTML = `
    <b>New PAYE:</b> ₦${newPAYE.toLocaleString()}
  `;
}

/* ===== PIT ===== */
function calculatePIT(){
  const gross = Number(pitGross.value);
  const expenses = Number(pitExpenses.value);
  const net = Math.max(gross - expenses, 0);
  const annual = net * 12;
  const tax = annualTax(annual);

  pitResult.innerHTML = `
    <b>Monthly PIT:</b> ₦${(tax/12).toLocaleString()}
  `;
}

/* ===== BULK EXCEL PROCESSING ===== */
let processedData = [];

function processExcel(){
  const file = document.getElementById('excelFile').files[0];
  if(!file){ alert("Upload Excel file"); return; }

  const reader = new FileReader();
  reader.onload = function(e){
    const data = new Uint8Array(e.target.result);
    const workbook = XLSX.read(data, {type:'array'});
    const sheet = workbook.Sheets[workbook.SheetNames[0]];
    const json = XLSX.utils.sheet_to_json(sheet);

    processedData = json.map(row => {
      const gross = Number(row["Gross Salary"]) || 0;
      const oldPAYE = Number(row["Old PAYE"]) || 0;
      const newPAYE = computeNewPAYE(gross);
      const diff = oldPAYE - newPAYE;

      return {
        ...row,
        "New PAYE": newPAYE,
        "Difference": diff
      };
    });

    displayPreview(processedData);
    document.getElementById('downloadBtn').style.display="block";
  };

  reader.readAsArrayBuffer(file);
}

function displayPreview(data){
  let html = "<table><tr>";
  Object.keys(data[0]).forEach(k=> html += `<th>${k}</th>`);
  html += "</tr>";

  data.slice(0,20).forEach(row=>{
    html += "<tr>";
    Object.values(row).forEach(v=>{
      html += `<td>${v}</td>`;
    });
    html += "</tr>";
  });

  html += "</table>";
  excelPreview.innerHTML = html;
}

function downloadExcel(){
  const ws = XLSX.utils.json_to_sheet(processedData);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Processed Payroll");
  XLSX.writeFile(wb, "Processed_PAYE.xlsx");
}

</script>
</body>
</html>
